project:
  type: book

book:
  title: "An Introduction to OpenAlex in R"
  author: "Aditya Ranganath"
  repo-url: https://github.com/aranganath24/openalexr-lesson
  repo-actions: [source, edit, issue] 
  date: "3/23/2026"
  chapters:
    - index.qmd
    - intro.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    toc: true
    toc-depth: 4
    number-depth: 4
    include-after-body: footer.html
    theme:
      - cosmo
      - brand
  pdf:
    documentclass: scrreprt

editor: visual

